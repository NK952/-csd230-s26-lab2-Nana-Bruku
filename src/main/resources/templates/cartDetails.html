<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Your Shopping Cart</h2>
    <div>
        <a href="/books" class="btn btn-outline-primary me-2">Browse Books</a>
        <a href="/magazines" class="btn btn-outline-secondary">Browse Magazines</a>
    </div>
</div>

<div th:if="${cart == null or #sets.isEmpty(cart.products)}" class="alert alert-info text-center py-5">
    <h4 class="alert-heading">Your cart is empty!</h4>
    <p class="mb-0">Go back to the catalog pages to select items to buy.</p>
</div>

<div th:if="${cart != null and !#sets.isEmpty(cart.products)}">
    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th>Item Details</th>
            <th>Price</th>
            <th class="text-center" style="width: 150px;">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${cart.products}">
            <td>
                <strong th:text="${product.title}">Publication Title</strong>
                <small class="text-muted d-block" th:text="'SKU Reference: ' + ${product.productId}">UUID SKU</small>
            </td>
            <td>
                <span th:text="${#numbers.formatCurrency(product.price)}">$0.00</span>
            </td>
            <td class="text-center">
                <a th:href="@{/cart/remove/{id}(id=${product.id})}" class="btn btn-sm btn-danger">
                    Remove
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-end align-items-center mt-4 gap-3">

        <form th:action="@{/cart/checkout}" method="post">
            <button type="submit" class="btn btn-success btn-lg px-5 shadow-sm">
                Place Order &amp; Checkout
            </button>
        </form>
    </div>
</div>

</body>
</html>
