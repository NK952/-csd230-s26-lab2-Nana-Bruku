<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magazine Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Magazine Catalog</h2>
    <a th:href="@{/magazines/add}" class="btn btn-primary">Add New Magazine</a>
</div>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Price</th>
        <th>Available Copies</th>
        <th>Order Qty</th>
        <th>Current Issue</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="magazine : ${magazines}">
        <td th:text="${magazine.id}">1</td>
        <td th:text="${magazine.title}">Tech Monthly</td>
        <td th:text="${#numbers.formatCurrency(magazine.price)}">$0.00</td>
        <td th:text="${magazine.copies}">10</td>
        <td th:text="${magazine.orderQty}">5</td>
        <td th:text="${#temporals.format(magazine.currentIssue, 'yyyy-MM-dd HH:mm')}">2026-01-01</td>
        <td>
            <div class="btn-group" role="group">
                <a th:href="@{/cart/add/{productId}(productId=${magazine.id})}" class="btn btn-sm btn-success">
                    Add to Cart
                </a>
                <a th:href="@{/magazines/edit/{id}(id=${magazine.id})}" class="btn btn-sm btn-warning">
                    Edit
                </a>
                <a th:href="@{/magazines/delete/{id}(id=${magazine.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Are you sure you want to delete this magazine?');">
                    Delete
                </a>
            </div>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(magazines)}">
        <td colspan="7" class="text-center text-muted">No magazines available in the catalog.</td>
    </tr>
    </tbody>
</table>

<div class="mt-3">
    <a href="/books" class="btn btn-secondary">View Books</a>
    <a href="/cart" class="btn btn-outline-dark">View Cart</a>
</div>

</body>
</html>
